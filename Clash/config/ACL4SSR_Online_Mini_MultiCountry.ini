custom_proxy_group=🇭🇰 香港-超低倍率`url-test`(?=.*(港|HK|hk|Hong Kong|HongKong|hongkong))(?=.*0\.0\d*([xX]|倍)).*`http://www.google.com/generate_204`60,,50
