# --- 主功能与基础分组 ---
# 🚀 节点选择
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港`[]🇭🇰 香港-超低倍率`[]🇭🇰 香港-低倍率`[]🇭🇰 香港-高倍率`[]🇯🇵 日本`[]🇯🇵 日本-超低倍率`[]🇯🇵 日本-低倍率`[]🇯🇵 日本-高倍率`[]🇸🇬 新加坡`[]🇸🇬 新加坡-超低倍率`[]🇸🇬 新加坡-低倍率`[]🇸🇬 新加坡-高倍率`[]🇺🇲 美国`[]🇺🇲 美国-超低倍率`[]🇺🇲 美国-低倍率`[]🇺🇲 美国-高倍率`[]🇨🇳 台湾`[]🇨🇳 台湾-超低倍率`[]🇨🇳 台湾-低倍率`[]🇨🇳 台湾-高倍率`[]🇰🇷 韩国`[]🇰🇷 韩国-超低倍率`[]🇰🇷 韩国-低倍率`[]🇰🇷 韩国-高倍率`[]🚀 手动切换`[]DIRECT
custom_proxy_group=🚀 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.google.com/generate_204`60,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`[]♻️ 自动选择`.*

# --- 地区与倍率细分分组 ---

# 🇭🇰 香港
